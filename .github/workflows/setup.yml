name: Setup Infrastructure

on:
  workflow_dispatch:
    inputs:
      create_kv_namespace:
        description: "Create the RATE_LIMIT KV namespace"
        type: boolean
        default: true
      set_secrets:
        description: "Set worker secrets (must be stored in GitHub secrets first)"
        type: boolean
        default: true

# Required GitHub repository secrets:
#   CLOUDFLARE_API_TOKEN      - Cloudflare API token with Workers permissions
#   CLOUDFLARE_ACCOUNT_ID     - Your Cloudflare account ID
#   RACHIO_API_KEY            - Rachio API bearer token
#   RACHIO_MCP_URL_SECRET     - 64-char hex string (generate: openssl rand -hex 32)
#   CF_ACCESS_CLIENT_ID       - (optional) Cloudflare Access service token client ID
#   CF_ACCESS_CLIENT_SECRET   - (optional) Cloudflare Access service token client secret

jobs:
  setup:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci

      - name: Create KV namespace
        if: ${{ inputs.create_kv_namespace }}
        run: npx wrangler kv namespace create RATE_LIMIT || echo "KV namespace may already exist"

      - name: Set worker secrets
        if: ${{ inputs.set_secrets }}
        run: |
          printf '%s' "${{ secrets.RACHIO_API_KEY }}" | npx wrangler secret put RACHIO_API_KEY
          printf '%s' "${{ secrets.RACHIO_MCP_URL_SECRET }}" | npx wrangler secret put URL_SECRET

      - name: Set CF Access secrets (optional)
        if: ${{ inputs.set_secrets }}
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          if [ -n "$CF_ACCESS_CLIENT_ID" ]; then
            printf '%s' "$CF_ACCESS_CLIENT_ID" | npx wrangler secret put CF_ACCESS_CLIENT_ID
            printf '%s' "$CF_ACCESS_CLIENT_SECRET" | npx wrangler secret put CF_ACCESS_CLIENT_SECRET
          else
            echo "CF_ACCESS_CLIENT_ID not set, skipping"
          fi
